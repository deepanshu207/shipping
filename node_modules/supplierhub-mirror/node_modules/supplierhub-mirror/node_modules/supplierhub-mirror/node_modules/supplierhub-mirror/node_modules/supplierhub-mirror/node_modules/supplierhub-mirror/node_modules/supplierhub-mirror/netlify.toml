[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[build]
  publish = "supplierhub.in"
  functions = "netlify/functions"
  command = "npm install"

# Mock endpoints (no-login generate) — handled by Netlify Function
[[redirects]]
  from = "/auth/me"
  to = "/.netlify/functions/mock-api"
  status = 200

[[redirects]]
  from = "/auth/logout"
  to = "/.netlify/functions/mock-api"
  status = 200

[[redirects]]
  from = "/api/meesho/getLowestShippingCharge"
  to = "/.netlify/functions/mock-api"
  status = 200

[[redirects]]
  from = "/api/meesho/fetchAllRequestId"
  to = "/.netlify/functions/mock-api"
  status = 200

[[redirects]]
  from = "/api/meesho/request/*"
  to = "/.netlify/functions/mock-api"
  status = 200

[[redirects]]
  from = "/api/meesho/request-status/*"
  to = "/.netlify/functions/mock-api"
  status = 200

# Public categories API — proxy to SupplierHub backend (same-origin, no CORS)
[[redirects]]
  from = "/api/*"
  to = "https://backend.supplierhub.in/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "https://backend.supplierhub.in/auth/:splat"
  status = 200
  force = true

# SPA: direct URLs like /meesho-image-generator must serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
