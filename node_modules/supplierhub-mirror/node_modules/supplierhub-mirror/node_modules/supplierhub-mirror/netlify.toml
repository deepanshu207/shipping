[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]
  included_files = ["supplierhub.in/data/**"]

[build]
  publish = "supplierhub.in"
  functions = "netlify/functions"
  command = "npm install"

# All API + auth served by our own Netlify Function (no SupplierHub proxy)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/generate-api/api/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/generate-api/auth/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
