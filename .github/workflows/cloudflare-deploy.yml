name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: cloudflare-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Set worker name
        id: cfg
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=shipping-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "label=Preview (PR #${{ github.event.pull_request.number }})" >> "$GITHUB_OUTPUT"
          else
            echo "name=shipping" >> "$GITHUB_OUTPUT"
            echo "label=Production" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ steps.cfg.outputs.name }}
        env:
          WRANGLER_SEND_METRICS: "false"

      - name: Resolve deployment URL
        id: url
        shell: bash
        run: |
          URL="${{ steps.deploy.outputs.deployment-url }}"
          if [ -z "$URL" ]; then
            URL=$(echo '${{ steps.deploy.outputs.command-output }}' | grep -oE 'https://[a-zA-Z0-9._-]+\.workers\.dev' | head -1 || true)
          fi
          echo "value=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        if: steps.url.outputs.value != ''
        run: node scripts/verify-deploy.mjs "${{ steps.url.outputs.value }}"

      - name: Comment deploy URL on PR
        if: github.event_name == 'pull_request' && steps.url.outputs.value != ''
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.url.outputs.value }}
          DEPLOY_LABEL: ${{ steps.cfg.outputs.label }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = "<!-- cloudflare-deploy-bot -->";
            const url = process.env.DEPLOY_URL;
            const body = [
              marker,
              `## Cloudflare deploy — ${process.env.DEPLOY_LABEL}`,
              "",
              `**Live URL:** ${url}`,
              "",
              `Commit: \`${process.env.HEAD_SHA.slice(0, 7)}\``,
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
