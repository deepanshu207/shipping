name: Deploy — Cloudflare Workers (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Find production URL
        id: url
        run: |
          URL=$(echo "${{ steps.deploy.outputs.command-output }}" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1)
          if [ -z "$URL" ]; then
            URL="${{ vars.CLOUDFLARE_DEPLOY_URL }}"
          fi
          if [ -n "$URL" ]; then
            echo "production=$URL" >> "$GITHUB_OUTPUT"
            echo "Production URL: $URL"
          else
            echo "Set CLOUDFLARE_DEPLOY_URL repo variable for verify step fallback."
          fi

      - name: Verify deployment
        if: steps.url.outputs.production != ''
        env:
          DEPLOY_URL: ${{ steps.url.outputs.production }}
        run: node scripts/verify-deploy.mjs "$DEPLOY_URL"
