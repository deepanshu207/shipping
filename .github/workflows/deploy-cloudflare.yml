name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - testv1_DA
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Verify deployment
        env:
          DEPLOY_URL: ${{ vars.CLOUDFLARE_DEPLOY_URL }}
        run: |
          if [ -n "$DEPLOY_URL" ]; then
            node scripts/verify-deploy.mjs "$DEPLOY_URL"
          else
            echo "Set repository variable CLOUDFLARE_DEPLOY_URL to enable post-deploy checks."
          fi
