[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]
  included_files = ["supplierhub.in/data/meesho-categories.json"]

[functions."generate-api"]
  timeout = 60

[build]
  publish = "supplierhub.in"
  functions = "netlify/functions"
  command = "npm install"

[build.environment]
  NODE_VERSION = "20"
  GIT_SUBMODULE_STRATEGY = "none"

# Own API via Netlify Function (browser own-api.js is fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/generate-api/api/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/generate-api/auth/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
